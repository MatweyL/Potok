<div class="modal modal-open" x-data="{ algorithmType: 'PERIODIC' }">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-4">Create Monitoring Algorithm</h3>

        <form
            hx-post="/monitoring-algorithms/create"
            hx-target="body"
            hx-swap="beforeend"
            hx-on::after-request="if(event.detail.successful) { document.getElementById('modal-container').innerHTML = ''; showToast('Algorithm created!', 'success'); window.location.reload(); }"
            class="space-y-4"
        >
            <!-- Algorithm Type -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Algorithm Type</span>
                    <span class="label-text-alt text-error">*</span>
                </label>
                <select
                    name="algorithm_type"
                    class="select select-bordered"
                    x-model="algorithmType"
                    required
                >
                    <option value="PERIODIC">Periodic (runs every N seconds)</option>
                    <option value="SINGLE">Single (runs N times with delays)</option>
                </select>
            </div>

            <!-- Periodic Fields -->
            <div x-show="algorithmType === 'PERIODIC'" class="space-y-4">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Timeout (seconds)</span>
                        <span class="label-text-alt text-error">*</span>
                    </label>
                    <input
                        type="number"
                        name="timeout"
                        class="input input-bordered"
                        placeholder="3600"
                        step="0.1"
                        min="0"
                        x-bind:required="algorithmType === 'PERIODIC'"
                    >
                    <label class="label">
                        <span class="label-text-alt">How often the task will run</span>
                    </label>
                </div>
            </div>

            <!-- Single Fields -->
            <div x-show="algorithmType === 'SINGLE'" class="space-y-4">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Timeouts (JSON array)</span>
                    </label>
                    <textarea
                        name="timeouts"
                        class="textarea textarea-bordered font-mono text-sm"
                        placeholder="[100, 200, 300]"
                    >[100, 200, 300]</textarea>
                    <label class="label">
                        <span class="label-text-alt">Delays between executions. Empty = run once</span>
                    </label>
                </div>
            </div>

            <!-- Timeout Noise (common for both) -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Timeout Noise (seconds)</span>
                </label>
                <input
                    type="number"
                    name="timeout_noize"
                    class="input input-bordered"
                    placeholder="0"
                    value="0"
                    step="0.1"
                    min="0"
                >
                <label class="label">
                    <span class="label-text-alt">Random variance added/subtracted from timeout</span>
                </label>
            </div>

            <!-- Actions -->
            <div class="modal-action">
                <button
                    type="button"
                    class="btn"
                    onclick="document.getElementById('modal-container').innerHTML = ''"
                >
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                    Create Algorithm
                </button>
            </div>
        </form>
    </div>
    <div class="modal-backdrop" onclick="document.getElementById('modal-container').innerHTML = ''"></div>
</div>
