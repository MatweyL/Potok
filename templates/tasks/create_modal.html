<div class="modal modal-open" x-data="{ algorithmType: 'PERIODIC' }">
    <div class="modal-box max-w-2xl">
        <h3 class="font-bold text-lg mb-4">Create New Task</h3>

        <form
            hx-post="/tasks/create"
            hx-target="#tasks-table-body"
            hx-swap="afterbegin"
            hx-on::after-request="if(event.detail.successful) { document.getElementById('modal-container').innerHTML = ''; showToast('Task created successfully!', 'success'); }"
            class="space-y-4"
        >
            <!-- Group Name -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Group Name</span>
                    <span class="label-text-alt text-error">*</span>
                </label>
                <input
                    type="text"
                    name="group_name"
                    class="input input-bordered"
                    placeholder="e.g., data_sync_tasks"
                    required
                >
            </div>

            <!-- Monitoring Algorithm -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Monitoring Algorithm</span>
                    <span class="label-text-alt text-error">*</span>
                </label>
                <select
                    name="monitoring_algorithm_id"
                    class="select select-bordered"
                    required
                >
                    <option disabled selected>Select algorithm...</option>
                    {% for algorithm in algorithms %}
                    <option value="{{ algorithm.id }}">
                        ID: {{ algorithm.id }} - {{ algorithm.type }}
                        {% if algorithm.type == 'PERIODIC' %}
                        ({{ algorithm.timeout }}s)
                        {% endif %}
                    </option>
                    {% endfor %}
                </select>
                <label class="label">
                    <span class="label-text-alt">
                        <a href="/monitoring-algorithms" class="link link-primary">Create new algorithm</a>
                    </span>
                </label>
            </div>

            <!-- Priority -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Priority</span>
                </label>
                <select name="priority" class="select select-bordered">
                    <option value="LOWEST">Lowest</option>
                    <option value="LOW">Low</option>
                    <option value="MEDIUM" selected>Medium</option>
                    <option value="HIGH">High</option>
                    <option value="HIGHEST">Highest</option>
                </select>
            </div>

            <!-- Task Type -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Task Type</span>
                </label>
                <select name="task_type" class="select select-bordered">
                    <option value="UNDEFINED" selected>Undefined</option>
                    <option value="TIME_INTERVAL">Time Interval</option>
                    <option value="PAGINATION">Pagination</option>
                </select>
            </div>

            <!-- Payload Data -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Payload Data (JSON)</span>
                </label>
                <textarea
                    name="payload_data"
                    class="textarea textarea-bordered font-mono text-sm h-24"
                    placeholder='{"key": "value"}'
                >{}</textarea>
                <label class="label">
                    <span class="label-text-alt">Enter valid JSON object</span>
                </label>
            </div>

            <!-- Actions -->
            <div class="modal-action">
                <button
                    type="button"
                    class="btn"
                    onclick="document.getElementById('modal-container').innerHTML = ''"
                >
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Create Task
                </button>
            </div>
        </form>
    </div>
    <div class="modal-backdrop" onclick="document.getElementById('modal-container').innerHTML = ''"></div>
</div>
