{% extends "base.html" %}
{% block title %}Поток — Вход{% endblock %}
{% block navbar %}{% endblock %}

{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4">

                <!-- Карточка входа -->
                <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                    <div class="card-body p-4 p-md-5">

                        <!-- Логотип / Заголовок -->
                        <div class="text-center mb-4">
                            <h1 class="h2 fw-bold text-primary mb-1">Поток</h1>
                            <p class="text-muted">Войдите в аккаунт</p>
                        </div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-medium">Логин или email</label>
                                <input
                                    type="text"
                                    id="username"
                                    name="username"
                                    class="form-control form-control-lg rounded-3"
                                    placeholder="username или email"
                                    autocomplete="username"
                                    required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-medium">Пароль</label>
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="form-control form-control-lg rounded-3"
                                    placeholder="••••••••"
                                    autocomplete="current-password"
                                    required>
                            </div>

                            <!-- Сообщение об ошибке -->
                            <div id="errorMsg" class="alert alert-danger d-none rounded-3 py-2 small"></div>

                            <button
                                type="submit"
                                id="submitBtn"
                                class="btn btn-primary btn-lg w-100 rounded-3 fw-semibold py-3 mb-3">
                                Войти
                            </button>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Сброс ошибок
        errorMsg.classList.add('d-none');
        errorMsg.textContent = '';

        submitBtn.disabled = true;
        submitBtn.innerHTML = `
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
            Вход...
        `;

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: form.username.value.trim(),
                    password: form.password.value,
                }),
            });

            const data = await res.json();

            if (data.success) {
                window.__accessToken = data.access_token;
                window.location.href = '/projects';
            } else {
                errorMsg.textContent = data.error || 'Неверный логин или пароль';
                errorMsg.classList.remove('d-none');
            }
        } catch (err) {
            errorMsg.textContent = 'Нет связи с сервером. Проверьте подключение к интернету.';
            errorMsg.classList.remove('d-none');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Войти';
        }
    });
</script>
{% endblock %}
