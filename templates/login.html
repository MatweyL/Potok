{% extends "base.html" %}
{% block title %}Поток — Вход{% endblock %}
{% block navbar %}{% endblock %}  {# скрываем navbar #}
{% block body %}

    <form id="loginForm">
      <div class="field">
        <label for="username">Логин</label>
        <input id="username" name="username" type="text" placeholder="username" autocomplete="username" required/>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>

      <div class="error" id="errorMsg"></div>

      <button type="submit" id="submitBtn">Войти</button>
    </form>
{% endblock %}
{% block extra_js %}

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Вход...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: form.username.value.trim(),
            password: form.password.value,
          }),
        });

        const data = await res.json();

        if (data.success) {
          // access token держим в памяти — не в localStorage
          window.__accessToken = data.access_token;
          window.location.href = '/tasks';
        } else {
          errorMsg.textContent = data.error || 'Ошибка входа';
        }
      } catch {
        errorMsg.textContent = 'Нет связи с сервером';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Войти';
      }
    });
  </script>
{% endblock %}
