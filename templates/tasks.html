{% extends "base.html" %}
{% block title %}Поток — Задачи{% endblock %}

{% block extra_css %}
<style>
  .s-badge {
    display: inline-flex; align-items: center; gap: .3rem;
    font-size: .75rem; font-weight: 500;
    padding: .2rem .6rem; border-radius: 20px;
  }
  .s-badge::before { content:''; width:6px; height:6px; border-radius:50%; }
  .s-NEW       { background:#e0e7ff; color:#4338ca; }
  .s-NEW::before { background:#6366f1; }
  .s-EXECUTION { background:#fef3c7; color:#b45309; }
  .s-EXECUTION::before { background:#f59e0b; animation:blink 1.2s infinite; }
  .s-SUCCEED   { background:#dcfce7; color:#15803d; }
  .s-SUCCEED::before { background:#22c55e; }
  .s-FINISHED  { background:#f1f5f9; color:#64748b; }
  .s-FINISHED::before { background:#94a3b8; }
  .s-CANCELLED { background:#fee2e2; color:#b91c1c; }
  .s-CANCELLED::before { background:#f87171; }
  .s-ERROR     { background:#fee2e2; color:#991b1b; }
  .s-ERROR::before { background:#ef4444; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
{% endblock %}

{% block body %}
<div class="container-fluid px-4 py-4">

  <div class="d-flex align-items-center justify-content-between mb-4">
    <h1 class="fs-4 fw-bold mb-0">Задачи</h1>
    <a href="/tasks/create" class="btn btn-primary btn-sm">+ Создать</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <table id="tasksTable" class="table table-hover align-middle" style="width:100%">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Группа</th>
            <th>Статус</th>
            <th>Приоритет</th>
            <th>Тип</th>
            <th>Алгоритм</th>
            <th>Payload</th>
            <th>Обновлён</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function () {

  const table = $('#tasksTable').DataTable({
    serverSide: true,       // вся логика на сервере
    processing: true,       // показывает "Загрузка..." во время запроса
    ajax: {
      url: '/tasks/json',
      type: 'GET',
      // DataTables по умолчанию шлёт параметры как draw, start, length,
      // order[0][column], order[0][dir], search[value] — бэкенд их читает напрямую
    },
    order: [[0, 'desc']],
    pageLength: 25,
    language: { url: 'https://cdn.datatables.net/plug-ins/2.0.3/i18n/ru.json' },

    columns: [
      { data: 'id',         orderable: true  },
      { data: 'group_name', orderable: true  },
      { data: 'status',     orderable: true  },
      { data: 'priority',   orderable: true  },
      { data: 'type',       orderable: true  },
      { data: 'algorithm',  orderable: false },
      { data: 'payload',    orderable: false },
      { data: 'updated_at', orderable: true  },
    ],

    // Разрешаем HTML в ячейках (бэкенд возвращает готовую вёрстку)
    createdRow: function (row, data) {
      if (data.DT_RowAttr) {
        Object.entries(data.DT_RowAttr).forEach(([k, v]) => {
          $(row).attr(k, v);
        });
      }
    },
  });

  // Клик по строке → страница задачи
  $('#tasksTable tbody').on('click', 'tr', function () {
    const href = $(this).attr('data-href');
    if (href) window.location.href = href;
  });

});
</script>
{% endblock %}
